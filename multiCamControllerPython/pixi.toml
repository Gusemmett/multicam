[project]
name = "multiCamControllerPython"
version = "1.0.0"
description = "Cross-platform controller for multiple iPhone and OAK cameras"
authors = ["AngusEmmett <gusemmett@gmail.com>"]
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]

[dependencies]
python = ">=3.13"
pyside6 = "*"
pip = "*"
av = ">=15.1.0,<16"
numpy = ">=2.3.2,<3"
opencv = ">=4.10,<5"
tqdm = ">=4.66.5,<5"
natsort = ">=8.4.0,<9"

[pypi-dependencies]
depthai = ">=3.0.0"
qasync = ">=0.24.0"
zeroconf = ">=0.131.0"
boto3 = ">=1.34.0"
pytest = ">=7.4.0"
pytest-qt = ">=4.2.0"
black = ">=23.0.0"
rerun-sdk = ">=0.25.0"
pyinstaller = ">=6.0.0"
requests = ">=2.31.0"
packaging = ">=23.0"
multicam-common = { git = "https://github.com/Gusemmett/multiCamCommon.git", subdirectory = "python" }
# Embedded OAK server dependencies
aiohttp = ">=3.9.0"
aiofiles = ">=24.1.0"

[tasks]
dev = "python src/main.py"
debug = { cmd = "python src/main.py", env = { DEBUG = "1" } }
test = "pytest tests/"
format = "black src/ tests/"
format-check = "black --check src/ tests/"

# Packaging tasks
# Note: Uses custom spec file that includes FFmpeg binaries
build-app = 'pyinstaller --noconfirm "MultiCam Controller.spec"'
# Note: Uses custom spec file that includes FFmpeg binaries
build-app-universal = 'pyinstaller --noconfirm "MultiCam Controller-universal2.spec"'
clean-build = "rm -rf build dist"

# Signing and packaging (bumps patch version first)
sign-and-package = """
python scripts/bump_version.py && \
./signing.sh \
  --app-name "MultiCam Controller" \
  --entry "src/main.py" \
  --bundle-id "com.multicam.controller"
"""
sign-and-package-universal = """
python scripts/bump_version.py && \
./signing.sh \
  --app-name "MultiCam Controller" \
  --entry "src/main.py" \
  --bundle-id "com.multicam.controller" \
  --arch universal2
"""

# Release upload (assumes sign-and-package was run first)
upload-release = 'python scripts/upload_release.py "dist/MultiCam Controller.dmg"'
